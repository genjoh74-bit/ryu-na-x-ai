<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Ryu-na X</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card register-card">
            <div class="logo">
                <div class="ryu-logo">🥷</div>
                <h2>Create Ryu-na X Account</h2>
            </div>
            
            <form id="registerForm">
                <div class="input-group">
                    <label>Your Password</label>
                    <input type="password" id="password" placeholder="Create strong password (6+ chars)" required minlength="6">
                    <small>Your User ID will be generated automatically</small>
                </div>
                
                <button type="submit" class="btn-primary full-width">Create Account</button>
            </form>
            
            <div id="userIDDisplay" class="user-id-display hidden"></div>
            
            <div class="auth-links">
                <a href="/login.html">Have Account? Login</a>
                <a href="/">← Back to Home</a>
            </div>
            
            <div id="errorMsg" class="error hidden"></div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('registerForm').classList.add('hidden');
                    document.getElementById('userIDDisplay').classList.remove('hidden');
                    document.getElementById('userIDDisplay').innerHTML = `
                        <div class="success-message">
                            <h3>✅ Account Created!</h3>
                            <div class="user-id-box">${data.userID}</div>
                            <p><strong>⚠️ SAVE THIS USER ID!</strong><br>You'll need it to login.</p>
                            <button class="btn-primary" onclick="goToLogin()">Login Now</button>
                        </div>
                    `;
                } else {
                    showError(data.error || 'Registration failed');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        });
        
        function showError(msg) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = msg;
            errorEl.classList.remove('hidden');
        }
        
        function goToLogin() {
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
