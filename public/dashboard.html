<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ryu-na x made by Elvis - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', monospace;
            background: linear-gradient(-45deg, #0c0c0c, #1a0033, #0f0f23, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            z-index: 1;
        }

        .matrix-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(90deg, transparent 98%, rgba(0,255,200,0.03) 100%),
                linear-gradient(-90deg, transparent 98%, rgba(255,0,255,0.03) 100%);
            background-size: 20px 100%;
            animation: matrixRain 20s linear infinite;
        }

        @keyframes matrixRain {
            0% { transform: translateY(100vh) translateX(0); }
            100% { transform: translateY(-100px) translateX(10px); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .neon-glow {
            text-shadow: 0 0 5px #00ffcc, 0 0 10px #00ffcc, 0 0 20px #00ffcc;
        }

        .neon-glow-pink {
            text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 20px #ff00ff;
        }

        .btn-neon {
            background: linear-gradient(45deg, #00ffcc, #ff00ff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border: 2px solid transparent;
            background-origin: border-box;
            position: relative;
        }

        .btn-neon:hover {
            animation: neonPulse 1s infinite;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
        }

        @keyframes neonPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 204, 0.5); }
            50% { box-shadow: 0 0 40px rgba(0, 255, 204, 0.8), 0 0 60px rgba(255, 0, 255, 0.4); }
        }

        .user-id {
            background: linear-gradient(45deg, #00ffcc, #ff00ff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .chat-container {
            height: 80vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(0,255,204,0.3) transparent;
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: linear-gradient(45deg, #00ffcc, #ff00ff);
            border-radius: 4px;
        }

        .message {
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: linear-gradient(45deg, #00ffcc, #ff00ff);
            border-radius: 50%;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .chat-input {
                bottom: 20px !important;
            }
        }
    </style>
</head>
<body class="relative">
    <!-- Matrix Background -->
    <div class="matrix-bg"></div>
    
    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <div class="glass p-6 flex justify-between items-center z-10 relative">
            <div class="neon-glow text-3xl font-black">
                <i class="fas fa-robot mr-3 text-cyan-400"></i>
                ryu-na x
                <span class="text-sm ml-2 opacity-75">made by Elvis</span>
            </div>
            <div class="flex items-center space-x-4">
                <div class="text-sm opacity-75">
                    <i class="fas fa-user mr-1"></i>
                    <span id="userId" class="user-id font-bold"></span>
                </div>
                <button onclick="logout()" class="glass px-4 py-2 rounded-lg text-sm neon-glow hover:bg-white/10 transition-all">
                    <i class="fas fa-sign-out-alt mr-1"></i>Logout
                </button>
            </div>
        </div>

        <!-- Main Chat Container -->
        <div class="flex-1 flex flex-col lg:flex-row p-6 gap-6 z-10 relative">
            <!-- Chat Messages -->
            <div class="flex-1 glass rounded-2xl p-6 chat-container" id="chatContainer">
                <div class="text-center py-12">
                    <div class="neon-glow-pink text-6xl mb-4 animate-pulse">
                        <i class="fas fa-comments"></i>
                    </div>
                    <h2 class="text-2xl font-bold mb-2 text-white">ryu-na x</h2>
                    <p class="text-cyan-400 mb-4">Cyberpunk AI Companion</p>
                    <p class="text-gray-400 text-sm max-w-md mx-auto">
                        Start chatting with your personal AI. Type your message below.
                    </p>
                </div>
            </div>

            <!-- Chat Input -->
            <div class="lg:w-80 space-y-4 z-20">
                <div class="glass p-4 rounded-xl">
                    <div class="flex items-center space-x-2 mb-3">
                        <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
                        <span class="text-green-400 text-sm font-mono">AI Online</span>
                    </div>
                    <div class="space-y-2">
                        <input 
                            type="text" 
                            id="messageInput"
                            placeholder="Type your message... (Ctrl+Enter to send)"
                            class="w-full bg-black/30 border border-white/20 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-cyan-400 transition-all"
                        >
                        <div class="flex items-center justify-between text-xs text-gray-500">
                            <span id="charCount">0/2000</span>
                            <div>
                                <button id="voiceBtn" class="p-2 hover:text-cyan-400 transition-colors">
                                    <i class="fas fa-microphone"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <button 
                    onclick="sendMessage()" 
                    class="w-full glass py-4 px-6 rounded-xl font-bold text-lg btn-neon flex items-center justify-center space-x-2 hover:scale-105 transition-all group"
                >
                    <i class="fas fa-paper-plane"></i>
                    <span>Send Message</span>
                    <div class="w-3 h-3 border-2 border-white/30 border-t-cyan-400 rounded-full animate-spin group-hover:opacity-100 opacity-0 transition-all"></div>
                </button>
            </div>
        </div>
    </div>

    <script>
        const userId = localStorage.getItem('userId');
        const token = localStorage.getItem('token');
        document.getElementById('userId').textContent = userId;

        // Verify token on load
        fetch('/api/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
        }).catch(() => {
            localStorage.clear();
            window.location.href = 'index.html';
        });

        let messages = [];
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');

        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 4) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Add message to chat
        function addMessage(content, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message glass p-4 rounded-2xl mb-4 max-w-2xl ${isUser ? 'ml-auto bg-gradient-to-r from-cyan-500/20 to-purple-500/20 border-cyan-400/30' : 'bg-gradient-to-r from-purple-500/10 to-pink-500/10 border-purple-400/30'}`;
            
            messageDiv.innerHTML = `
                <div class="flex ${isUser ? 'justify-end' : 'justify-start'} items-start space-x-3 space-x-reverse">
                    ${!isUser ? '<div class="w-8 h-8 bg-gradient-to-r from-purple-500 to-pink-500 rounded-full flex items-center justify-center flex-shrink-0 mt-1"><i class="fas fa-robot text-white text-sm"></i></div>' : ''}
                    <div class="max-w-xs lg:max-w-md">
                        <div class="prose prose-sm prose-invert leading-relaxed">${content.replace(/\n/g, '<br>')}</div>
                    </div>
                    ${isUser ? '<div class="w-8 h-8 bg-gradient-to-r from-cyan-400 to-blue-500 rounded-full flex items-center justify-center flex-shrink-0 mt-1"><i class="fas fa-user text-white text-sm"></i></div>' : ''}
                </div>
            `;
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Send message
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || message.length > 2000) return;

            addMessage(message, true);
            messageInput.value = '';
            document.getElementById('charCount').textContent = '0/2000';
            
            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'glass p-4 rounded-2xl mb-4 max-w-md';
            typingIndicator.innerHTML = `
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 bg-gradient-to-r from-purple-500 to-pink-500 rounded-full flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-robot text-white text-sm"></i>
                    </div>
                    <div class="flex space-x-1">
                        <div class="w-3 h-3 bg-purple-400 rounded-full animate-bounce"></div>
                        <div class="w-3 h-3 bg-pink-400 rounded-full animate-bounce" style="animation-delay: 0.1s;"></div>
                        <div class="w-3 h-3 bg-purple-400 rounded-full animate-bounce" style="animation-delay: 0.2s;"></div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(typingIndicator);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                chatContainer.removeChild(typingIndicator);
                
                if (data.reply) {
                    addMessage(data.reply);
                } else {
                    addMessage("Sorry, I couldn't process that request. Try again?", false);
                }
            } catch (error) {
                chatContainer.removeChild(typingIndicator);
                addMessage("Connection error. Please check your internet.", false);
            }
        }

        // Character counter
        messageInput.addEventListener('input', (e) => {
            document.getElementById('charCount').textContent = `${e.target.value.length}/2000`;
        });

        // Keyboard shortcuts
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Logout
        function logout() {
            if (confirm('Logout from ryu-na x?')) {
                localStorage.clear();
                window.location.href = 'index.html';
            }
        }

        // Init
        createParticles();
        setInterval(createParticles, 3000);
    </script>
</body>
</html>
