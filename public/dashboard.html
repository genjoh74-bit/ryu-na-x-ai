<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryu-na X - Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="chat-container" id="chatContainer">
        <!-- Loading screen -->
        <div class="loading-screen" id="loadingScreen">
            <div class="ryu-logo big">🥷</div>
            <p>Initializing Ryu-na X...</p>
        </div>
        
        <!-- Main chat -->
        <div class="chat-app hidden" id="chatApp">
            <div class="chat-header">
                <div class="brand">
                    <div class="ryu-logo">🥷</div>
                    <span>Ryu-na X</span>
                    <span id="userIDHeader" class="user-id"></span>
                </div>
                <div class="header-actions">
                    <button id="logoutBtn" class="btn-logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
            
            <div class="chat-messages" id="messagesArea"></div>
            
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Ask Ryu-na X anything..." autofocus>
                    <button class="send-btn" id="sendBtn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('ryuToken');
        let userID = localStorage.getItem('ryuUserID');
        
        // Verify auth on load
        async function init() {
            if (!token || !userID) {
                window.location.href = '/login.html';
                return;
            }
            
            const response = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            
            const data = await response.json();
            if (!data.valid) {
                localStorage.removeItem('ryuToken');
                localStorage.removeItem('ryuUserID');
                window.location.href = '/login.html';
                return;
            }
            
            document.getElementById('userIDHeader').textContent = userID;
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('chatApp').classList.remove('hidden');
            
            addMessage("Hi! I'm Ryu-na X, your personal AI assistant made by Elvis. How can I help you today?", 'assistant');
        }
        
        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        
        function addMessage(text, sender) {
            const messagesArea = document.getElementById('messagesArea');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerHTML = `
                <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
                <div class="timestamp">${getTime()}</div>
            `;
            messagesArea.appendChild(msgDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function showThinking() {
            const thinkDiv = document.createElement('div');
            thinkDiv.className = 'thinking';
            thinkDiv.id = 'thinkingIndicator';
            thinkDiv.innerHTML = '<i class="fas fa-robot"></i> Ryu-na X is thinking...';
            document.getElementById('messagesArea').appendChild(thinkDiv);
            document.getElementById('messagesArea').scrollTop = document.getElementById('messagesArea').scrollHeight;
        }
        
        async function sendMessage() {
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const text = userInput.value.trim();
            
            if (!text) return;
            
            userInput.disabled = true;
            sendBtn.disabled = true;
            
            addMessage(text, 'user');
            userInput.value = '';
            showThinking();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                
                const data = await response.json();
                document.getElementById('thinkingIndicator').remove();
                addMessage(data.reply, 'assistant');
            } catch (error) {
                document.getElementById('thinkingIndicator').remove();
                addMessage('Sorry, something went wrong. Please try again.', 'assistant');
            }
            
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
        
        // Event listeners
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('ryuToken');
            localStorage.removeItem('ryuUserID');
            window.location.href = '/';
        });
        
        // Init app
        init();
    </script>
</body>
</html>
