<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryu-na X - AI Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="landing">
        <div class="logo">
            <div class="ryu-logo">🥷</div>
            <h1>Ryu-na X</h1>
            <p>AI Chat Assistant</p>
            <span class="byline">Made by Elvis</span>
        </div>
        
        <div class="action-buttons">
            <button class="btn-primary" onclick="goToLogin()">Login</button>
            <button class="btn-secondary" onclick="goToRegister()">Create Account</button>
        </div>
        
        <div class="features">
            <div class="feature">🔒 Secure User ID Login</div>
            <div class="feature">🤖 AI Powered Chat</div>
            <div class="feature">⚡ Fast & Private</div>
        </div>
    </div>

    <script>
        function goToLogin() {
            window.location.href = '/login.html';
        }
        
        function goToRegister() {
            window.location.href = '/register.html';
        }
    </script>
</body>
</html>
